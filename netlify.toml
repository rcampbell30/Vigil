[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  PYTHON_VERSION = "3.11"
  NODE_VERSION = "20"

[[redirects]]
  from = "/data/ranked-candidates"
  to = "/data/ranked_candidates.csv"
  status = 200

[[redirects]]
  from = "/data/top-10"
  to = "/data/top_10.json"
  status = 200

[[redirects]]
  from = "/api/top-10"
  to = "/data/top_10.json"
  status = 200

[[redirects]]
  from = "/api/ranked-candidates"
  to = "/data/ranked_candidates.json"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
