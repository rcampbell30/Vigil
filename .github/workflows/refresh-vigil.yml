name: Refresh Vigil exoplanet index

on:
  workflow_dispatch:
  schedule:
    # Run once a year on 12 May at 06:00 UTC.
    - cron: "0 6 12 5 *"
  push:
    branches:
      - main
    paths:
      - "scraper.py"
      - "habitability.py"
      - "generate_site.py"
      - "generate_data.py"
      - "requirements.txt"
      - "tests/**"
      - ".github/workflows/refresh-vigil.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest

      - name: Fetch latest NASA exoplanet data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scraper.py

      - name: Regenerate static HTML site
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python generate_site.py

      - name: Regenerate Astro data exports
        run: python generate_data.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build

      - name: Commit refreshed data and site
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh Vigil exoplanet index"
          file_pattern: "data/*.csv public/data/*.json public/data/*.csv index.html"
