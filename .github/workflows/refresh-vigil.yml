name: Refresh Vigil exoplanet index

on:
  workflow_dispatch:
  schedule:
    # Run once a year on 12 May at 06:00 UTC.
    - cron: "0 6 12 5 *"
  push:
    branches:
      - main
    paths:
      - "scraper.py"
      - "habitability.py"
      - "generate_site.py"
      - ".github/workflows/refresh-vigil.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest NASA exoplanet data
        run: python scraper.py

      - name: Regenerate static site
        run: python generate_site.py

      - name: Commit refreshed data and site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh Vigil exoplanet index"
          file_pattern: "data/*.csv index.html"
